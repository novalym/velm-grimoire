# ==============================================================================
# == CELESTIAL GOVERNOR & GENOMIC INQUISITOR (V-Ω-0-TORCH-TOTALITY)            ==
# ==============================================================================
# LIF: ∞ | ROLE: HUB_REGISTRY_SANCTIFIER | RANK: OMEGA_SOVEREIGN
# AUTH: Ω_ASCENSION_VMAX_0_TORCH_2026_FINALIS

name: Ω | Celestial Ascension & 0-Torch Vector Suture

on:
  push:
    branches: [ main ]
    paths:
      - 'archetypes/**.scaffold'
      - 'shards/**.scaffold'
      - 'traits/**.scaffold'
      - 'infrastructure/**.scaffold'
      - 'codex/shards/**.scaffold'
      - 'atoms/**.py'
      - 'scripts/rebuild_index.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  adjudicate_and_ascend:
    name: The Rite of 0-Torch Ascension
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Summoning Local Matter
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Consecrating Python Substrate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # [ASCENSION 1 - THE CURE]: 0-TORCH METABOLISM
      - name: 📦 Summoning 0-Torch Artisans
        run: |
          python -m pip install --upgrade pip
          pip install onnxruntime tokenizers numpy pydantic rich pyyaml

      - name: 🧠 Caching the Neural Retina
        uses: actions/cache@v3
        with:
          path: ~/.scaffold/models
          key: ucl-onnx-minilm-v6-quantized

      # =========================================================================
      # == THE SUPREME INQUEST: GENOMIC ONTOLOGY ADJUDICATION (v3.5)           ==
      # =========================================================================
      - name: 🔍 Conducting Multiversal Genomic Inquest
        id: inquest
        shell: python
        run: |
          import os
          import sys
          import re
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel

          console = Console()
          
          # [THE MASTER SUTURE]: v3.0 GENOMIC SPECIFICATION
          # We search for the base gene name (e.g., 'id') rather than literal strings.
          SHARD_GENES = ["id", "version", "tier", "summary", "vibe", "provides", "requires", "metabolism", "substrate", "suture"]
          ARCH_GENES  = ["id", "version", "summary", "tags"]
          
          GENE_MAP = {
              "SHARD": SHARD_GENES, "TRAIT": SHARD_GENES,
              "MONAD": SHARD_GENES, "CITADEL": SHARD_GENES,
              "ARCHETYPE": ARCH_GENES
          }

          # [THE FIX]: OMNI-REGEX PHALANX
          # This pattern matches: optional '#' + optional whitespace + '@' + gene_name + ':'
          def get_gene_pattern(gene):
              return re.compile(rf"^\s*#\s*@{re.escape(gene)}\s*:", re.MULTILINE | re.IGNORECASE)

          ONTOLOGY_PATTERN = re.compile(r"== GNOSTIC (DNA )?(?P<type>SHARD|TRAIT|MONAD|CITADEL|ARCHETYPE):", re.IGNORECASE)
          METABOLISM_STRUCT_PATTERN = re.compile(r"^\s*#\s*@metabolism:\s*\n\s*#\s+(python|node|env|apt):", re.MULTILINE | re.IGNORECASE)
          
          PROJECT_ROOT = Path.cwd().resolve()
          critical_heresies = []
          advisory_heresies = []

          def conduct_inquest(directory):
              strata_path = PROJECT_ROOT / directory
              if not strata_path.exists(): return
                  
              for path in strata_path.rglob("*.scaffold"):
                  if ".scaffold" in path.parts: continue
                  
                  try:
                      content = path.read_text(encoding='utf-8', errors='ignore')
                      if not content.strip(): continue
                      
                      # DIVINE ONTOLOGY (Search top 20 lines)
                      lines = content.splitlines()
                      o_type = None
                      for line in lines[:20]:
                          match = ONTOLOGY_PATTERN.search(line)
                          if match:
                              o_type = match.group("type").upper()
                              break
                      
                      if not o_type:
                          o_type = "ARCHETYPE" if "archetype" in str(path).lower() else "SHARD"
                      
                      genes = GENE_MAP.get(o_type, SHARD_GENES)
                      missing = []

                      # =============================================================
                      # == [THE CURE]: THE FUZZY GENE SCRY                          ==
                      # =============================================================
                      for gene in genes:
                          if not get_gene_pattern(gene).search(content):
                              missing.append(f"@{gene}:")

                      if o_type == "SHARD":
                          # Struct validation
                          if "@metabolism:" in content and not METABOLISM_STRUCT_PATTERN.search(content):
                              missing.append("@metabolism (INVALID_YAML_STRUCTURE)")
                          if "@suture:" in content and not re.search(r"role\s*:", content, re.I):
                              missing.append("@suture (MISSING_ROLE_DNA)")

                      if missing:
                          rel_path = path.relative_to(PROJECT_ROOT)
                          h_record = {"file": str(rel_path), "type": o_type, "missing": ", ".join(missing)}
                          
                          if o_type == "ARCHETYPE":
                              print(f"::warning file={rel_path},line=1::Advisory Heresy: {o_type} missing genes: {h_record['missing']}")
                              advisory_heresies.append(h_record)
                          else:
                              print(f"::error file={rel_path},line=1::Critical Heresy: {o_type} missing genes: {h_record['missing']}")
                              critical_heresies.append(h_record)
                              
                  except Exception as e:
                      print(f"::warning ::Failed to scry '{path}': {e}")

          console.print(Panel("[bold cyan]0-TORCH GENOMIC INQUEST (v3.5 - REGEX SUTURE): INITIATED[/]", border_style="cyan"))
          
          for strata in ["shards", "archetypes", "traits", "infrastructure", "codex/shards"]:
              conduct_inquest(strata)

          if critical_heresies:
              table = Table(title="[bold red]CRITICAL GENOMIC FRACTURES[/]", border_style="red", expand=True)
              table.add_column("Locus (Shard)", style="magenta")
              table.add_column("Missing Pillars", style="bold red")
              for h in critical_heresies:
                  table.add_row(h['file'], h['missing'])
              console.print(table)
              sys.exit(1)
          
          if advisory_heresies:
              table = Table(title="[bold yellow]ADVISORY GENOMIC DRIFT[/]", border_style="yellow", expand=True)
              table.add_column("Locus (Archetype)", style="magenta")
              table.add_column("Missing Pillars", style="bold yellow")
              for h in advisory_heresies:
                  table.add_row(h['file'], h['missing'])
              console.print(table)

          console.print(Panel("[bold green]✨ LATTICE RESONANT: ALL CORE GENOMES ARE PURE[/]", border_style="green"))

      # --- III. THE TRANSFORMATION (ONNX VECTORIZATION) ---
      - name: 🌀 Materializing 0-Torch Celestial Atlas (index.json)
        run: |
          mkdir -p registry
          python scripts/rebuild_index.py \
            --repo ${{ github.repository }} \
            --branch main \
            --output registry/index.json \
            --engine onnx

      # --- IV. THE CHRONICLE INSCRIPTION ---
      - name: 📜 Inscribing the Vector Reality
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Celestial-Scribe"
          git config --global user.email "scribe@novalym.systems"
          
          if [ -z "$(git status --porcelain registry/index.json)" ]; then
            echo "Lattice is resonant. No drift perceived."
          else
            echo "Gnostic Drift detected. Sealing the Index..."
            git add registry/index.json
            git commit -m "chore(atlas): transfigure v3.5 regex-sutured index [v${{ github.run_number }}] [skip ci]"
            git push origin main
            echo "✨ The Celestial Hub has ascended with 0-Torch Isomorphic Parity."
          fi

      - name: 📡 Broadcasting Resonance
        if: success() && github.event_name == 'push'
        run: |
          echo "Ω TOTALITY ACHIEVED. THE 0-TORCH GENOME IS STABLE."