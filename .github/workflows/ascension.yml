# ==============================================================================
# == CELESTIAL GOVERNOR & GENOMIC INQUISITOR (V-Ω-0-TORCH-TOTALITY)            ==
# ==============================================================================
# LIF: ∞ | ROLE: HUB_REGISTRY_SANCTIFIER | RANK: OMEGA_SOVEREIGN
# AUTH: Ω_ASCENSION_VMAX_0_TORCH_2026_FINALIS

name: Ω | Celestial Ascension & 0-Torch Vector Suture

on:
  push:
    branches: [ main ]
    paths:
      - 'archetypes/**.scaffold'
      - 'shards/**.scaffold'
      - 'traits/**.scaffold'
      - 'infrastructure/**.scaffold'
      - 'codex/shards/**.scaffold'
      - 'atoms/**.py'
      - 'scripts/rebuild_index.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  adjudicate_and_ascend:
    name: The Rite of 0-Torch Ascension
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Summoning Local Matter
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Consecrating Python Substrate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # [ASCENSION 1 - THE CURE]: 0-TORCH METABOLISM
      # We physically banish 'torch' and 'sentence-transformers'.
      # We only summon the leanest artisans for ONNX inference.
      - name: 📦 Summoning 0-Torch Artisans
        run: |
          python -m pip install --upgrade pip
          pip install onnxruntime tokenizers numpy pydantic rich pyyaml

      - name: 🧠 Caching the Neural Retina
        uses: actions/cache@v3
        with:
          path: ~/.scaffold/models
          key: ucl-onnx-minilm-v6-quantized

      # =========================================================================
      # == THE SUPREME INQUEST: GENOMIC ONTOLOGY ADJUDICATION (v3.4)           ==
      # =========================================================================
      - name: 🔍 Conducting Multiversal Genomic Inquest
        id: inquest
        shell: python
        run: |
          import os
          import sys
          import re
          import yaml
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel

          console = Console()
          
          # [THE MASTER SUTURE]: 10-PILLAR GENOMIC SPECIFICATION
          GENOMIC_PILLARS = [
              "@id:", "@version:", "@tier:", "@summary:", "@vibe:", 
              "@provides:", "@requires:", "@metabolism:", "@substrate:", "@suture:"
          ]
          # Archetypes follow a separate, non-enforced track in this ascension
          ARCHETYPE_PILLARS = ["@id:", "@version:", "@summary:", "@tags:"]
          
          ONTOLOGY_MAP = {
              "SHARD": GENOMIC_PILLARS,
              "TRAIT": GENOMIC_PILLARS,
              "MONAD": GENOMIC_PILLARS,
              "CITADEL": GENOMIC_PILLARS,
              "ARCHETYPE": ARCHETYPE_PILLARS
          }

          # [THE FIX]: Scan first 20 lines for the signature (Bypass borders)
          ONTOLOGY_PATTERN = re.compile(r"== GNOSTIC (DNA )?(?P<type>SHARD|TRAIT|MONAD|CITADEL|ARCHETYPE):", re.IGNORECASE)
          PROJECT_ROOT = Path.cwd().resolve()
          
          critical_heresies = []
          advisory_heresies = []

          # [THE FIX]: Flexible Comment-Aware Regex
          METABOLISM_PATTERN = re.compile(r"(?:#\s*)?@metabolism:\s*\n(?:#\s*)?\s+\w+:")

          def conduct_inquest(directory):
              strata_path = PROJECT_ROOT / directory
              if not strata_path.exists(): return
                  
              for path in strata_path.rglob("*.scaffold"):
                  if ".scaffold" in path.parts: continue
                  
                  try:
                      content = path.read_text(encoding='utf-8', errors='ignore')
                      if not content.strip(): continue
                      
                      # [THE CURE]: Deep Header Search (Top 20 lines)
                      lines = content.splitlines()
                      o_type = None
                      for line in lines[:20]:
                          match = ONTOLOGY_PATTERN.search(line)
                          if match:
                              o_type = match.group("type").upper()
                              break
                      
                      if not o_type:
                          o_type = "ARCHETYPE" if "archetype" in str(path).lower() else "SHARD"
                      
                      pillars = ONTOLOGY_MAP.get(o_type, GENOMIC_PILLARS)
                      content_lower = content.lower()
                      
                      # [THE FIX]: Surgical Pillar Presence Check
                      missing = []
                      for p in pillars:
                          if p.lower() not in content_lower:
                              missing.append(p)
                      
                      # [THE FIX]: Verify Shard-specific structure
                      if o_type == "SHARD":
                          if "@metabolism:" in content and not METABOLISM_PATTERN.search(content):
                              missing.append("@metabolism (INVALID_YAML_STRUCTURE)")
                          if "@suture:" in content and "role:" not in content_lower:
                              missing.append("@suture (MISSING_ROLE_DNA)")

                      if missing:
                          rel_path = path.relative_to(PROJECT_ROOT)
                          h_record = {"file": str(rel_path), "type": o_type, "missing": ", ".join(missing)}
                          
                          if o_type == "ARCHETYPE":
                              print(f"::warning file={rel_path},line=1::Advisory Heresy: Archetype is evolving. Missing: {h_record['missing']}")
                              advisory_heresies.append(h_record)
                          else:
                              print(f"::error file={rel_path},line=1::Critical Heresy: {o_type} is missing pillars: {h_record['missing']}")
                              critical_heresies.append(h_record)
                              
                  except Exception as e:
                      print(f"::warning ::Perception clouded for '{path}': {e}")

          console.print(Panel("[bold cyan]0-TORCH GENOMIC INQUEST (v3.4): INITIATED[/]", border_style="cyan"))
          
          for strata in ["shards", "archetypes", "traits", "infrastructure", "codex/shards"]:
              conduct_inquest(strata)

          if critical_heresies:
              table = Table(title="[bold red]CRITICAL GENOMIC FRACTURES (SHARDS)[/]", border_style="red", expand=True)
              table.add_column("Locus", style="magenta")
              table.add_column("Type", style="yellow", justify="center")
              table.add_column("Missing Pillars", style="bold red")
              for h in critical_heresies:
                  table.add_row(h['file'], h['type'], h['missing'])
              console.print(table)
              sys.exit(1)
          
          if advisory_heresies:
              table = Table(title="[bold yellow]ADVISORY GENOMIC DRIFT (ARCHETYPES)[/]", border_style="yellow", expand=True)
              table.add_column("Locus", style="magenta")
              table.add_column("Missing Pillars", style="bold yellow")
              for h in advisory_heresies:
                  table.add_row(h['file'], h['missing'])
              console.print(table)

          console.print(Panel("[bold green]✨ LATTICE RESONANT: ALL CORE GENOMES ARE PURE[/]", border_style="green"))

      # --- III. THE TRANSFORMATION (ONNX VECTORIZATION) ---
      - name: 🌀 Materializing 0-Torch Celestial Atlas (index.json)
        if: steps.inquest.outcome == 'success'
        run: |
          mkdir -p registry
          python scripts/rebuild_index.py \
            --repo ${{ github.repository }} \
            --branch main \
            --output registry/index.json \
            --engine onnx

      # --- IV. THE CHRONICLE INSCRIPTION ---
      - name: 📜 Inscribing the Vector Reality
        if: steps.inquest.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Celestial-Scribe"
          git config --global user.email "scribe@novalym.systems"
          
          if [ -z "$(git status --porcelain registry/index.json)" ]; then
            echo "Lattice is resonant. No drift perceived."
          else
            echo "Gnostic Drift detected. Sealing the Index..."
            git add registry/index.json
            git commit -m "chore(atlas): transfigure v3.4 0-torch genomic index [v${{ github.run_number }}] [skip ci]"
            git push origin main
            echo "✨ The Celestial Hub has ascended with 0-Torch Isomorphic Parity."
          fi

      - name: 📡 Broadcasting Resonance
        if: success() && github.event_name == 'push'
        run: |
          echo "Ω TOTALITY ACHIEVED. THE 0-TORCH GENOME IS STABLE."