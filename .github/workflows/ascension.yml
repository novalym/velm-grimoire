# Path: .github/workflows/ascension.yml
# ------------------------------------
# LIF: ∞ // ROLE: CELESTIAL_GOVERNOR_&_FORENSIC_INQUISITOR
# AUTH_CODE: Ω_ASCENSION_VMAX_REPORT_FIX_2026_FINALIS

name: Ω | Celestial Ascension & ONNX Vector Adjudication

on:
  push:
    branches: [ main ]
    paths:
      - 'archetypes/**.scaffold'
      - 'shards/**.scaffold'
      - 'traits/**.scaffold'
      - 'infrastructure/**.scaffold'
      - 'atoms/**.py'
      - 'scripts/rebuild_index.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  adjudicate_and_ascend:
    name: The Rite of ONNX Vector Ascension
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Summoning Local Matter
        uses: actions/checkout@v4

      - name: 🐍 Consecrating Python Substrate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Summoning Gnostic Artisans
        run: |
          python -m pip install --upgrade pip
          pip install onnxruntime tokenizers numpy pydantic rich

      - name: 🧠 Caching the Neural Retina
        uses: actions/cache@v3
        with:
          path: ~/.scaffold/models
          key: ucl-onnx-minilm-v2

      # =========================================================================
      # == THE SUPREME INQUEST: MULTIVERSAL ONTOLOGY ADJUDICATION (VMAX)       ==
      # =========================================================================
      - name: 🔍 Conducting Multiversal Gnostic Inquest
        shell: python
        run: |
          import os
          import sys
          import re
          from pathlib import Path
          
          # [THE FIX]: SURGICAL SYMBOL IMPORT
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel

          console = Console()
          
          # [THE LAWS OF FORM]: Defining the Pillars for each Ontology
          SHARD_PILLARS = ["@description:", "@category:", "@vibe:", "@provides:", "@requires:", "@substrate:", "@version:"]
          TRAIT_PILLARS = ["@description:", "@category:", "@vibe:", "@provides:", "@requires:", "@substrate:", "@version:"]
          CITADEL_PILLARS = ["@description:", "@category:", "@vibe:", "@provides:", "@requires:", "@substrate:", "@version:"]
          ARCH_PILLARS = ["@description:", "@category:", "@tags:"]
          
          ONTOLOGY_MAP = {
              "SHARD": SHARD_PILLARS,
              "TRAIT": TRAIT_PILLARS,
              "CITADEL": CITADEL_PILLARS,
              "MONAD": SHARD_PILLARS,
              "ARCHETYPE": ARCH_PILLARS
          }

          ONTOLOGY_PATTERN = re.compile(r"== GNOSTIC\s+(?P<type>SHARD|TRAIT|MONAD|CITADEL|ARCHETYPE):", re.IGNORECASE)
          
          # [THE FIX]: Anchoring Global Geometry
          PROJECT_ROOT = Path.cwd().resolve()
          heresies = []

          def conduct_inquest(directory):
              strata_path = PROJECT_ROOT / directory
              if not strata_path.exists():
                  return
                  
              for path in strata_path.rglob("*.scaffold"):
                  if ".scaffold" in path.parts: continue
                  
                  try:
                      content = path.read_text(encoding='utf-8', errors='ignore')
                      lines = content.splitlines()
                      if not lines: continue
                      
                      # 1. Divine Ontology
                      first_line = lines[0].strip()
                      onto_match = ONTOLOGY_PATTERN.search(first_line)
                      
                      if onto_match:
                          o_type = onto_match.group("type").upper()
                      else:
                          # Heuristic Fallback
                          o_type = "ARCHETYPE" if "archetype" in str(path).lower() else "SHARD"
                      
                      pillars = ONTOLOGY_MAP.get(o_type, SHARD_PILLARS)
                      
                      # 2. Adjudicate Content
                      content_lower = content.lower()
                      missing = [p for p in pillars if p.lower() not in content_lower]
                      
                      if missing:
                          # [THE FIX]: SAFE GEOMETRIC RELATIVIZATION
                          try:
                              rel_path = path.resolve().relative_to(PROJECT_ROOT)
                          except ValueError:
                              rel_path = path.name

                          for m in missing:
                              # Radiate GitHub Annotation
                              print(f"::error file={rel_path},line=1::Ontological Heresy: {o_type} is missing pillar '{m}'")
                              heresies.append({
                                  "file": str(rel_path), 
                                  "type": o_type, 
                                  "missing": m
                              })
                  except Exception as e:
                      print(f"::warning ::Failed to scry '{path}': {e}")

          console.print(Panel("[bold cyan]UCL MULTIVERSAL INQUEST: COMMENCING[/]", border_style="cyan"))
          
          # [ASCENSION 14]: Continuous discovery across all manifest strata
          target_strata = ["shards", "archetypes", "traits", "infrastructure", "codex/shards"]
          for strata in target_strata:
              conduct_inquest(strata)

          if heresies:
              table = Table(title="[bold red]THE CHRONICLE OF LATTICE FRACTURES[/]", border_style="red", expand=True)
              table.add_column("Locus (Relative Path)", style="magenta")
              table.add_column("Ontological Lifeform", style="yellow")
              # [THE FIX]: Boldness is part of the style string, not a kwarg
              table.add_column("Missing Gnostic Pillar", style="bold red")
              
              for h in heresies:
                  table.add_row(h['file'], h['type'], h['missing'])
              
              console.print(table)
              console.print(f"\n[bold red]🛑 FRACTURE DETECTED:[/] {len(heresies)} Heresies perceived in the architecture.")
              sys.exit(1)
          
          console.print(Panel("[bold green]✨ LATTICE RESONANT: ALL GNOSTIC GENOMES ARE PURE[/]", border_style="green"))

      # --- III. THE TRANSFORMATION (ONNX EMBEDDING) ---
      - name: 🌀 Materializing Lightweight Celestial Index
        run: |
          mkdir -p registry
          python scripts/rebuild_index.py \
            --repo ${{ github.repository }} \
            --branch main \
            --output registry/index.json

      # --- IV. THE CHRONICLE INSCRIPTION ---
      - name: 📜 Inscribing the Vector Reality
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Celestial-Scribe"
          git config --global user.email "scribe@novalym.systems"
          
          if [ -z "$(git status --porcelain registry/index.json)" ]; then
            echo "Lattice is resonant. No drift perceived."
          else
            echo "Gnostic Drift detected. Sealing the index..."
            git add registry/index.json
            git commit -m "chore(atlas): transfigure ONNX celestial index [v${{ github.run_number }}] [skip ci]"
            git push origin main
            echo "✨ The Registry has ascended with 0-Torch Purity."
          fi

      - name: 📡 Broadcasting Resonance
        if: success() && github.event_name == 'push'
        run: |
          echo "Ω TOTALITY ACHIEVED. THE ONNX VECTORS ARE ALIGNED."