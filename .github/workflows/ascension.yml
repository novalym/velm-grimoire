# ==============================================================================
# == CELESTIAL GOVERNOR & GENOMIC INQUISITOR (V-Ω-TOTALITY-V3.3-SELECTIVE)     ==
# ==============================================================================
# LIF: ∞^2 | ROLE: HUB_REGISTRY_SANCTIFIER | RANK: OMEGA_SOVEREIGN
# AUTH: Ω_ASCENSION_VMAX_STRATEGIC_ADJUDICATION_2026_FINALIS

name: Ω | Celestial Ascension & Genomic Suture

on:
  push:
    branches: [ main ]
    paths:
      - 'archetypes/**.scaffold'
      - 'shards/**.scaffold'
      - 'traits/**.scaffold'
      - 'infrastructure/**.scaffold'
      - 'codex/shards/**.scaffold'
      - 'atoms/**.py'
      - 'scripts/rebuild_index.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  adjudicate_and_ascend:
    name: The Rite of Genomic Ascension
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Summoning Local Matter
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Consecrating Python Substrate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Summoning 0-Torch Artisans
        run: |
          python -m pip install --upgrade pip
          pip install onnxruntime tokenizers numpy pydantic rich pyyaml

      - name: 🧠 Caching the Neural Retina
        uses: actions/cache@v3
        with:
          path: ~/.scaffold/models
          key: ucl-onnx-minilm-v6-quantized

      # =========================================================================
      # == THE SUPREME INQUEST: GENOMIC ONTOLOGY ADJUDICATION (V3.3)           ==
      # =========================================================================
      - name: 🔍 Conducting Multiversal Genomic Inquest
        id: inquest
        shell: python
        run: |
          import os
          import sys
          import re
          import yaml
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel

          console = Console()
          
          # [THE GNOSTIC LAW V3.2]
          GENOMIC_PILLARS = [
              "@id:", "@version:", "@tier:", "@summary:", "@vibe:", 
              "@provides:", "@requires:", "@metabolism:", "@substrate:", "@suture:"
          ]
          ARCHETYPE_PILLARS = ["@id:", "@version:", "@summary:", "@tags:"]
          
          ONTOLOGY_MAP = {
              "SHARD": GENOMIC_PILLARS, "TRAIT": GENOMIC_PILLARS,
              "MONAD": GENOMIC_PILLARS, "CITADEL": GENOMIC_PILLARS,
              "ARCHETYPE": ARCHETYPE_PILLARS
          }

          ONTOLOGY_PATTERN = re.compile(r"== GNOSTIC (DNA )?(?P<type>SHARD|TRAIT|MONAD|CITADEL|ARCHETYPE):", re.IGNORECASE)
          PROJECT_ROOT = Path.cwd().resolve()
          
          # [THE BICAMERAL LEDGER]: We now track critical vs. advisory heresies.
          critical_heresies = []
          advisory_heresies = []

          METABOLISM_STRUCTURE_PATTERN = re.compile(r"(?:#\s*)?@metabolism:\s*\n(?:#\s*)?\s+\w+:")

          def conduct_inquest(directory):
              strata_path = PROJECT_ROOT / directory
              if not strata_path.exists(): return
                  
              for path in strata_path.rglob("*.scaffold"):
                  if ".scaffold" in path.parts: continue
                  
                  try:
                      content = path.read_text(encoding='utf-8', errors='ignore')
                      if not content.strip(): continue
                      
                      first_line = content.splitlines()[0].strip()
                      onto_match = ONTOLOGY_PATTERN.search(first_line)
                      
                      o_type = onto_match.group("type").upper() if onto_match else ("ARCHETYPE" if "archetype" in str(path).lower() else "SHARD")
                      
                      pillars = ONTOLOGY_MAP.get(o_type, GENOMIC_PILLARS)
                      content_lower = content.lower()
                      missing = [p for p in pillars if p.lower() not in content_lower]
                      
                      if o_type == "SHARD":
                          if "@metabolism:" in content and not METABOLISM_STRUCTURE_PATTERN.search(content):
                              missing.append("@metabolism (INVALID_STRUCTURE)")
                          if "@suture:" in content and "role:" not in content:
                              missing.append("@suture (MISSING_ROLE_DNA)")

                      if missing:
                          rel_path = path.relative_to(PROJECT_ROOT)
                          heresy_record = {"file": str(rel_path), "type": o_type, "missing": ", ".join(missing)}

                          # =============================================================
                          # == [THE CURE]: THE RITE OF SELECTIVE ADJUDICATION          ==
                          # =============================================================
                          # Shards are CRITICAL. Archetypes are ADVISORY.
                          if o_type == "ARCHETYPE":
                              print(f"::warning file={rel_path},line=1::Advisory Heresy: {o_type} is missing pillars: {', '.join(missing)}")
                              advisory_heresies.append(heresy_record)
                          else:
                              print(f"::error file={rel_path},line=1::Critical Heresy: {o_type} is missing pillars: {', '.join(missing)}")
                              critical_heresies.append(heresy_record)

                  except Exception as e:
                      print(f"::warning ::Perception clouded for '{path}': {e}")

          console.print(Panel("[bold cyan]0-TORCH GENOMIC INQUEST (v3.3 - SELECTIVE ADJUDICATION): INITIATED[/]", border_style="cyan"))
          
          for strata in ["shards", "archetypes", "traits", "infrastructure", "codex/shards"]:
              conduct_inquest(strata)

          if advisory_heresies:
              table = Table(title="[bold yellow]ADVISORY LEDGER: Archetype Genomic Drift[/]", border_style="yellow", expand=True)
              table.add_column("Locus (Archetype)", style="magenta")
              table.add_column("Missing Gnostic Pillar(s)", style="bold yellow")
              for h in advisory_heresies:
                  table.add_row(h['file'], h['missing'])
              console.print(table)

          if critical_heresies:
              table = Table(title="[bold red]CRITICAL LEDGER: Shard Genomic Fractures[/]", border_style="red", expand=True)
              table.add_column("Locus (Shard)", style="magenta")
              table.add_column("Missing Gene (Pillar)", style="bold red")
              for h in critical_heresies:
                  table.add_row(h['file'], h['missing'])
              console.print(table)
              console.print(f"\n[bold red]🛑 LATTICE FRACTURE DETECTED:[/] {len(critical_heresies)} critical heresies must be healed.")
              sys.exit(1)
          
          console.print(Panel("[bold green]✨ LATTICE RESONANT: ALL CRITICAL GENOMES ARE PURE[/]", border_style="green"))

      # --- III. THE TRANSFORMATION (ONNX VECTORIZATION) ---
      - name: 🌀 Materializing 0-Torch Celestial Atlas (index.json)
        if: steps.inquest.outcome == 'success'
        run: |
          mkdir -p registry
          python scripts/rebuild_index.py \
            --repo ${{ github.repository }} \
            --branch main \
            --output registry/index.json \
            --engine onnx

      # --- IV. THE CHRONICLE INSCRIPTION ---
      - name: 📜 Inscribing the Vector Reality
        if: steps.inquest.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Celestial-Scribe"
          git config --global user.email "scribe@novalym.systems"
          
          if [ -z "$(git status --porcelain registry/index.json)" ]; then
            echo "Lattice is resonant. No drift perceived."
          else
            echo "Gnostic Drift detected. Sealing the Index..."
            git add registry/index.json
            git commit -m "chore(atlas): transfigure v3.3 0-torch genomic index [v${{ github.run_number }}] [skip ci]"
            git push origin main
            echo "✨ The Celestial Hub has ascended with Isomorphic Parity."
          fi

      - name: 📡 Broadcasting Resonance
        if: success() && github.event_name == 'push'
        run: |
          echo "Ω TOTALITY ACHIEVED. THE 0-TORCH GENOME IS STABLE."