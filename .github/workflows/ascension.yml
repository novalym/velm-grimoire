# Path: .github/workflows/ascension.yml
# ------------------------------------

name: Ω | Celestial Ascension & ONNX Vector Adjudication

on:
  push:
    branches: [ main ]
    paths:
      - 'archetypes/**.scaffold'
      - 'shards/**.scaffold'
      - 'atoms/**.py'
      - 'scripts/rebuild_index.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manual invocation by the Sovereign Architect

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  adjudicate_and_ascend:
    name: The Rite of ONNX Vector Ascension
    runs-on: ubuntu-latest
    
    steps:
      # --- I. THE MATERIALIZATION ---
      - name: 📥 Summoning Local Matter
        uses: actions/checkout@v4

      - name: 🐍 Consecrating Python Substrate
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # [ASCENSION 1]: THE CURE (Lightweight Dependencies)
      - name: 📦 Summoning Gnostic Artisans (Zero-Torch Mode)
        run: |
          python -m pip install --upgrade pip
          # We only need the lean runtime and the tokenizers. 
          # No 500MB PyTorch mass allowed in this sanctum.
          pip install onnxruntime tokenizers numpy pydantic rich

      # [ASCENSION 2]: NEURAL WEIGHTS CACHE
      # Caches the 25MB ONNX model to save network energy.
      - name: 🧠 Caching the Neural Retina
        uses: actions/cache@v3
        with:
          path: ~/.scaffold/models
          key: ucl-onnx-minilm-v2

      # --- II. THE INQUEST (7-PILLAR LINTING) ---
      - name: 🔍 Conducting 7-Pillar Gnostic Inquest
        run: |
          echo "Adjudicating UCL Taxonomy..."
          ERROR_COUNT=0
          # Recursive scry of the Shard and Archetype sanctums
          for file in $(find archetypes shards -name "*.scaffold"); do
            for pillar in "@description:" "@category:" "@vibe:" "@provides:" "@requires:" "@substrate:" "@version:"; do
              if ! grep -qi "$pillar" "$file"; then
                echo "::error file=$file,line=1::Heresy: Missing $pillar"
                ERROR_COUNT=$((ERROR_COUNT+1))
              fi
            done
          done
          if [ $ERROR_COUNT -ne 0 ]; then exit 1; fi

      # --- III. THE TRANSFORMATION (ONNX EMBEDDING) ---
      # [ASCENSION 2]: THE MASTER CENSUS
      - name: 🌀 Materializing Lightweight Celestial Index
        run: |
          mkdir -p registry
          # The script is willed to use our new onnxruntime-based SemanticResolver logic.
          # It downloads the 25MB model weights if the cache missed.
          python scripts/rebuild_index.py \
            --repo ${{ github.repository }} \
            --branch main \
            --output registry/index.json

      # --- IV. THE CHRONICLE INSCRIPTION ---
      - name: 📜 Inscribing the Vector Reality
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Celestial-Scribe"
          git config --global user.email "scribe@novalym.systems"
          
          if [ -z "$(git status --porcelain registry/index.json)" ]; then
            echo "Lattice is resonant. No drift perceived."
          else
            echo "Gnostic Drift detected. Sealing the index..."
            git add registry/index.json
            git commit -m "chore(atlas): transfigure ONNX celestial index [v${{ github.run_number }}] [skip ci]"
            git push origin main
            echo "✨ The Registry has ascended with 0-Torch Purity."
          fi

      # --- V. THE OCULAR RESONANCE ---
      - name: 📡 Broadcasting Resonance
        if: success() && github.event_name == 'push'
        run: |
          echo "Ω TOTALITY ACHIEVED. THE ONNX VECTORS ARE ALIGNED."