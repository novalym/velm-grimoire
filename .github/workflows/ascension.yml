name: Ω | Celestial Ascension & Vector Adjudication

on:
  push:
    branches: [ main ]
    paths:
      - 'archetypes/**.scaffold'
      - 'shards/**.scaffold'
      - 'atoms/**.py'
      - 'scripts/**.py'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual invocation by the Architect

# [ASCENSION 1]: THREAD ISOLATION
# Ensures that simultaneous pushes do not result in a fragmented index or race conditions.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  #[THE CURE]: Explicitly define the Repository DNA for the Librarian
  REPO_NAME: ${{ github.repository }}

jobs:
  adjudicate_and_ascend:
    name: The Rite of Vector Ascension
    runs-on: ubuntu-latest
    
    steps:
      # --- I. THE MATERIALIZATION ---
      - name: 📥 Summoning Local Matter
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Consecrating Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # [ASCENSION 2]: THE HUGGINGFACE CACHE SUTURE
      # Caches the Sentence Transformer model to eliminate the 80MB download tax on every run.
      - name: 🧠 Caching the Neural Weights
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-minilm-l6-v2
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: 📦 Summoning Gnostic Artisans & Vector Engines
        run: |
          python -m pip install --upgrade pip
          
          # Install the Velm Engine for the GnosticDNAOracle
          pip install velm-cli
          
          # Summon the Vector Artisans (for pre-computing SCAF-Hub embeddings)
          pip install sentence-transformers onnxruntime rich pydantic

      # --- II. THE INQUEST (THE 7-PILLAR LINTING) ---
      # [ASCENSION 4]: PRE-FLIGHT HERESY CHECK (THE 7 PILLARS)
      - name: 🔍 Conducting 7-Pillar Gnostic Inquest
        run: |
          echo "Performing forensic scan for the 7-Pillar Gnostic Header..."
          ERROR_COUNT=0
          
          # Scry both Archetypes and Shards
          for file in $(find archetypes shards -name "*.scaffold"); do
            echo "Scrying Soul: $file..."
            
            # The 7 Sacred Laws of the Header
            for pillar in "@description:" "@category:" "@vibe:" "@provides:" "@requires:" "@substrate:" "@version:"; do
              if ! grep -qi "$pillar" "$file"; then
                echo "::error file=$file,line=1::Heresy Detected: Missing $pillar in header."
                ERROR_COUNT=$((ERROR_COUNT+1))
              fi
            done
          done
          
          if [ $ERROR_COUNT -ne 0 ]; then
            echo "💥 Inquest found $ERROR_COUNT fatal heresies. The Trinity is incomplete. Ascension halted."
            exit 1
          fi
          echo "✅ All Shards and Archetypes adhere to the 7-Pillar Taxonomy."

      # --- III. THE TRANSFORMATION (VECTOR EMBEDDING) ---
      #[ASCENSION 7]: THE MASTER CENSUS & EMBEDDING
      - name: 🌀 Materializing Embedded Celestial Index
        run: |
          echo "Summoning the Rebuild Script to forge registry/index.json..."
          
          # Ensure the registry sanctum exists
          mkdir -p registry
          
          # The script now processes archetypes, shards, and atoms, and calculates vectors.
          python scripts/rebuild_index.py \
            --repo ${{ github.repository }} \
            --branch main \
            --archetypes archetypes \
            --shards shards \
            --atoms atoms \
            --output registry/index.json

      # --- IV. THE CHRONICLE INSCRIPTION ---
      # [ASCENSION 12]: THE FINALITY VOW
      - name: 📜 Inscribing the Vector Reality
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Celestial-Scribe"
          git config --global user.email "scribe@novalym.systems"
          
          # [THE CURE]: The Gaze of Total Awareness (scries untracked files)
          if [ -z "$(git status --porcelain registry/index.json)" ]; then
            echo "Lattice is already in harmony. Vectors are unchanged."
          else
            echo "Gnostic Drift detected in registry/index.json. Inscribing Vectors..."
            git add registry/index.json
            git commit -m "chore(atlas): transfigure embedded celestial index [v${{ github.run_number }}] [skip ci]"
            git push origin main
            echo "✨ The Grimoire has ascended with Mathematical Purity."
          fi

      # --- V. THE OCULAR RESONANCE ---
      - name: 📡 Broadcasting Resonance
        if: success() && github.event_name == 'push'
        run: |
          echo "Broadcasting success to the Gnostic Mesh..."
          echo "Ω TOTALITY ACHIEVED. THE VECTORS ARE ALIGNED."